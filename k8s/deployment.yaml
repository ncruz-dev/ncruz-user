apiVersion: apps/v1
kind: Deployment
metadata:
  name: ncruz-user
  namespace: default
  labels:
    app: ncruz-user
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ncruz-user
  template:
    metadata:
      labels:
        app: ncruz-user
        version: v1
    spec:
      serviceAccountName: ncruz-user
      containers:
      - name: ncruz-user
        image: ghcr.io/your-org/ncruz-user:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8087
          protocol: TCP
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: ncruz-user-config
              key: datasource.url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: ncruz-user-secrets
              key: db.username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ncruz-user-secrets
              key: db.password
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "update"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8087
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8087
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      securityContext:
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - ncruz-user
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: ncruz-user
  namespace: default
  labels:
    app: ncruz-user
spec:
  type: ClusterIP
  selector:
    app: ncruz-user
  ports:
  - name: http
    port: 8087
    targetPort: 8087
    protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ncruz-user-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ncruz-user
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ncruz-user-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ncruz-user
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ncruz-user-config
  namespace: default
data:
  datasource.url: "jdbc:h2:mem:testdb"
---
apiVersion: v1
kind: Secret
metadata:
  name: ncruz-user-secrets
  namespace: default
type: Opaque
stringData:
  db.username: sa
  db.password: ""

